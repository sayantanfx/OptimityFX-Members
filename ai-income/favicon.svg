<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0A00"/>
      <stop offset="100%" stop-color="#000D1A"/>
    </linearGradient>
    <linearGradient id="bm" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0033FF"/>
      <stop offset="40%"  stop-color="#00FF88"/>
      <stop offset="70%"  stop-color="#FFE800"/>
      <stop offset="100%" stop-color="#FF0066"/>
    </linearGradient>
    <linearGradient id="bx" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CC2222"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="8" fill="url(#bg)"/>
  <!-- Beam -->
  <polygon points="4,58 14,58 50,8 44,5" fill="url(#bm)" opacity="0.9"/>
  <!-- FX box -->
  <rect x="22" y="14" width="38" height="30" rx="1" fill="none" stroke="url(#bx)" stroke-width="2"/>
  <!-- FX text -->
  <text x="24" y="40"
    font-family="'Arial Black','Impact',sans-serif"
    font-weight="900"
    font-style="italic"
    font-size="27"
    fill="white"
    letter-spacing="-1">FX</text>
  <!-- Underline -->
  <rect x="4" y="60" width="56" height="1.5" fill="url(#bm)" rx="0.5" opacity="0.8"/>
</svg>
